services:
  registry:
    image: descartesresearch/teastore-registry:${TEASTORE_TAG:-latest}
    expose:
      - "8080"

  db:
    image: descartesresearch/teastore-db:${TEASTORE_TAG:-latest}
    expose:
      - "3306"
    volumes:
      - teastore-db-data:/var/lib/mysql

  persistence:
    image: descartesresearch/teastore-persistence:${TEASTORE_TAG:-latest}
    expose:
      - "8080"
    environment:
      HOST_NAME: persistence
      REGISTRY_HOST: registry
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      - registry
      - db

  auth:
    image: descartesresearch/teastore-auth:${TEASTORE_TAG:-latest}
    expose:
      - "8080"
    environment:
      HOST_NAME: auth
      REGISTRY_HOST: registry
    depends_on:
      - registry

  image:
    image: descartesresearch/teastore-image:${TEASTORE_TAG:-latest}
    expose:
      - "8080"
    environment:
      HOST_NAME: image
      REGISTRY_HOST: registry
    depends_on:
      - registry

  recommender:
    image: descartesresearch/teastore-recommender:${TEASTORE_TAG:-latest}
    expose:
      - "8080"
    environment:
      HOST_NAME: recommender
      REGISTRY_HOST: registry
    depends_on:
      - registry

  webui:
    image: descartesresearch/teastore-webui:${TEASTORE_TAG:-latest}
    expose:
      - "8080"
    environment:
      HOST_NAME: webui
      REGISTRY_HOST: registry
    ports:
      - "${TEASTORE_WEB_PORT:-8080}:8080"
    depends_on:
      - registry
      - auth
      - persistence
      - image
      - recommender

volumes:
  teastore-db-data:
